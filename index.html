<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Band</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; background:#050509; color:#f5f5f5; margin:0; }
    header { padding:60px 20px; text-align:center; background:radial-gradient(circle at top, #5b5bff, #050509); }
    h1 { margin:0; font-size:3rem; letter-spacing:0.1em; text-transform:uppercase; }
    h2 { margin-top:10px; font-weight:400; color:#c0c0ff; }
    section { max-width:800px; margin:40px auto; padding:0 20px; }
    a { color:#c0c0ff; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .links a { margin-right:15px; }
  </style>
</head>
<body>
  <header>
    <h1>My Band</h1>
    <h2>Dark electronic / experimental</h2>
  </header>

  <section>
    <h3>About</h3>
    <p>Short bio about the band goes here.</p>
  </section>

  <section>
    <h3>Music</h3>
    <p>Embed or link to Spotify, YouTube, Bandcamp, or SoundCloud.</p>
  </section>

  <section>
    <h3>Contact</h3>
    <p>Email: you@example.com</p>
    <div class="links">
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
      <a href="#">Bandcamp</a>
    </div>
  </section>
</body>
</html>
